<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Library</title>

  <!-- Bootstrap 5 (CDN) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<div class="app-shell">

  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <a class="app-logo" href="#">
      <i class="bi bi-music-note-beamed"></i>
      <span>Music Library</span>
    </a>

    <div class="search-wrap">
      <i class="bi bi-search"></i>
      <input
        id="search-input"
        type="search"
        placeholder="Rechercher artiste, album, titre, genre…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="search-clear" title="Effacer">✕</button>
    </div>

    <span id="stats-bar"></span>
  </header>

  <!-- ── Sidebar ────────────────────────────────────────────────────────────── -->
  <aside class="app-sidebar">
    <div class="sidebar-section-title">Artistes</div>
    <ul id="artist-list"></ul>
  </aside>

  <!-- ── Album grid ─────────────────────────────────────────────────────────── -->
  <main class="app-main">
    <div class="section-heading" id="grid-heading">Albums</div>
    <div class="row g-3" id="album-grid"></div>
  </main>

  <!-- ── Track panel ────────────────────────────────────────────────────────── -->
  <aside class="app-panel">
    <div id="track-panel">
      <div class="track-panel-empty">
        <i class="bi bi-vinyl"></i>
        <p>Sélectionne un album pour voir les pistes</p>
      </div>
    </div>
  </aside>

</div>

<!-- Toast container -->
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<!-- Bootstrap JS bundle -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmTkdFHDHBAmQkjv3RQNZ4g7Xhq"
  crossorigin="anonymous"
></script>

<!-- App script -->
<script src="assets/js/script.js"></script>
</body>
</html>
